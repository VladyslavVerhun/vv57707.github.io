<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask Book CRUD{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #eef3f8;
            color: #1d2939;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background: #132238;
            color: #ffffff;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        main {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .page-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 8px;
        }

        p {
            margin: 0;
            color: #667085;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
        }

        th,
        td {
            padding: 14px 16px;
            border: 1px solid #d0d5dd;
            text-align: left;
        }

        th {
            background: #132238;
            color: #ffffff;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .actions form {
            margin: 0;
        }

        .button,
        button {
            display: inline-block;
            border: 1px solid #98a2b3;
            border-radius: 6px;
            background: #ffffff;
            color: #1d2939;
            padding: 9px 13px;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        .primary {
            border-color: #2563eb;
            background: #2563eb;
            color: #ffffff;
        }

        .warning {
            border-color: #d97706;
            background: #f59e0b;
            color: #111827;
        }

        .detail-card,
        .form-card {
            max-width: 720px;
            padding: 28px;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
        }

        dl {
            display: grid;
            grid-template-columns: 180px 1fr;
            margin: 24px 0;
            border-top: 1px solid #d0d5dd;
        }

        dt,
        dd {
            margin: 0;
            padding: 12px 0;
            border-bottom: 1px solid #d0d5dd;
        }

        dt {
            font-weight: 700;
        }

        label {
            display: grid;
            gap: 6px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid #98a2b3;
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        footer {
            margin-top: 48px;
            padding: 20px;
            border-top: 1px solid #d0d5dd;
            color: #667085;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <a class="brand" href="/books">Book Library</a>
        <div class="nav-links">
            <a href="/books">Books</a>
            <a href="/books/create">Create Book</a>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>Flask Book CRUD - Vladyslav Verhun</footer>
</body>
</html>
